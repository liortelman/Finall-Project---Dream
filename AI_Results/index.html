const MODELS = ["ChatGPT", "Gemini", "Claude"];

let answers = {};
let currentFilter = 'all';
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbz7cEFSzFudcbD4fTNb9drtfTpuzA-KVV2L8twViaVEzm769maQqUYwXd2yD8aZoMX8/exec';

const syncTimers = {};

function syncToSheets(p, model, val) {
  const timerKey = p.condition + '_' + p.axis + '_' + p.trial + '_' + model;
  // Cancel previous pending sync for this cell
  if (syncTimers[timerKey]) clearTimeout(syncTimers[timerKey]);
  // Wait 1.5s before sending — if user changes again, timer resets
  syncTimers[timerKey] = setTimeout(async () => {
    try {
      await fetch(SHEETS_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          condition: p.condition,
          axis: p.axis,
          trial: p.trial,
          correct_answer: p.correct_answer,
          pole_shown: p.pole_shown,
          model: model,
          model_answer: val,
          correct: val ? (parseInt(val) === p.correct_answer ? 1 : 0) : ''
        })
      });
    } catch(e) { console.log('Sync error:', e); }
  }, 1500);
}

const saved = localStorage.getItem('dream_multi_answers');
if (saved) answers = JSON.parse(saved);

function setFilter(val, btn) {
  currentFilter = val;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function key(p, model) {
  return p.condition + '_' + p.axis + '_' + p.trial + '_' + model;
}

function render() {
  const filtered = PROMPTS.filter(p =>
    currentFilter === 'all' || p.condition === currentFilter || p.axis === currentFilter
  );

  document.getElementById('cards').innerHTML = filtered.map((p, i) => {
    const condTag = p.condition === 'no_labels'
      ? '<span class="tag tag-nl">No labels</span>'
      : '<span class="tag tag-wl">With labels</span>';

    const modelCols = MODELS.map(m => {
      const k = key(p, m);
      const val = answers[k] || '';
      const isCorrect = val && parseInt(val) === p.correct_answer;
      const resultHtml = val
        ? `<div class="model-result ${isCorrect?'res-correct':'res-wrong'}">${isCorrect?'✓ Correct':'✗ Wrong'}</div>`
        : '<div class="model-result"></div>';
      return `<div class="model-col">
        <div class="model-name">${m}</div>
        <select class="model-select" onchange="record('${k}',this.value,0,'${m}')">
          <option value="">—</option>
          ${[1,2,3,4].map(n=>`<option value="${n}" ${val==n?'selected':''}>Dream ${n}</option>`).join('')}
        </select>
        ${resultHtml}
      </div>`;
    }).join('');

    const escapedPrompt = p.prompt.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

    return `<div class="prompt-card">
      <div class="card-top">
        <div class="card-meta">
          ${condTag}
          <span style="font-size:12px;color:#666"><strong style="color:#9090a8">${p.axis}</strong> · Trial ${p.trial}</span>
        </div>
        <div class="card-right">
          <span class="answer-key">✓ Dream ${p.correct_answer}</span>
          <button class="copy-btn" onclick="copyP(this,${i})">Copy prompt</button>
        </div>
      </div>
      <div class="prompt-text">${escapedPrompt}</div>
      <div class="model-answers">${modelCols}</div>
    </div>`;
  }).join('');

  updateSummary();
}

function copyP(btn, idx) {
  const filtered = PROMPTS.filter(p =>
    currentFilter === 'all' || p.condition === currentFilter || p.axis === currentFilter
  );
  navigator.clipboard.writeText(filtered[idx].prompt);
  btn.textContent = 'Copied!';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent = 'Copy prompt'; btn.classList.remove('copied'); }, 1500);
}

function record(k, val, pIdx, model) {
  if (val) answers[k] = val;
  else delete answers[k];
  localStorage.setItem('dream_multi_answers', JSON.stringify(answers));
  // sync to Sheets
  const filtered = PROMPTS.filter(p =>
    currentFilter === 'all' || p.condition === currentFilter || p.axis === currentFilter
  );
  if (val && filtered[pIdx]) syncToSheets(filtered[pIdx], model, val);
  updateSummary();
  render();
}

function updateSummary() {
  let total = 0, correct = 0, byModel = {};
  MODELS.forEach(m => byModel[m] = {t:0,c:0});
  PROMPTS.forEach(p => {
    MODELS.forEach(m => {
      const val = answers[key(p,m)];
      if (val) {
        total++;
        byModel[m].t++;
        if (parseInt(val) === p.correct_answer) { correct++; byModel[m].c++; }
      }
    });
  });
  const pct = total > 0 ? Math.round(correct/total*100) : 0;
  const modelStr = MODELS.map(m => {
    const {t,c} = byModel[m];
    const p = t > 0 ? Math.round(c/t*100) : 0;
    return `<span><strong>${m}:</strong> ${t}/100 &nbsp; ${t>0?p+'%':'—'}</span>`;
  }).join('');
  document.getElementById('summary').innerHTML =
    `<span><strong>Total:</strong> ${total}/300 answered</span><span><strong>Overall:</strong> ${pct}%</span>${modelStr}`;
}

function exportCSV() {
  const rows = [['condition','axis','trial','correct_answer','pole_shown','model','model_answer','correct']];
  PROMPTS.forEach(p => {
    MODELS.forEach(m => {
      const val = answers[key(p,m)] || '';
      const cor = val ? (parseInt(val)===p.correct_answer?1:0) : '';
      rows.push([p.condition,p.axis,p.trial,p.correct_answer,p.pole_shown,m,val,cor]);
    });
  });
  const csv = rows.map(r=>r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download = 'dream_manual_results.csv';
  a.click();
}

render();
